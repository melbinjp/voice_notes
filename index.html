<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.svg">
  <title>Voice Notes PWA</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎤 Voice Notes</h1>
      <p>Modular speech recognition with AI summarization</p>
    </div>

    <div class="main-content">
      <!-- Engine Selection -->
      <div class="engine-section">
        <select id="engineSelector" class="engine-selector">
          <option value="">Loading engines...</option>
        </select>
        <div class="engine-info" id="engineInfo">
          <div class="engine-type">Loading...</div>
          <div class="engine-description">Initializing...</div>
          <div class="engine-features" id="engineFeatures"></div>
        </div>
      </div>

      <!-- Session Title -->
      <input id="sessionTitle" type="text" class="session-title" placeholder="Session Title (optional)" maxlength="100" />

      <!-- Recording Controls -->
      <div class="recording-section">
        <button id="recordBtn" class="record-btn" disabled>Start Recording</button>
        <div id="recordingStatus" class="recording-status"></div>
      </div>

      <!-- Upload Audio Section -->
      <div class="upload-section" id="uploadSection" style="display: none;">
        <label for="audioFile" class="upload-label">📁 Upload Audio File</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="audioFile" accept="audio/*" style="display: none;" />
          <div class="upload-content">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
              <span class="upload-primary">Drop audio file here or click to browse</span>
              <span class="upload-secondary" id="uploadFormats">Supports MP3, WAV, M4A, OGG</span>
            </div>
          </div>
        </div>
        <div class="upload-actions">
          <button id="transcribeFileBtn" class="main-action" disabled>🎵 Transcribe File</button>
          <div id="fileInfo" class="file-info"></div>
        </div>
        
        <!-- Audio Player (Hidden by default) -->
        <audio id="audioPlayback" controls class="audio-player" style="display: none; width: 100%; margin-top: 15px; border-radius: 8px;"></audio>
        
        <!-- Progress Container (Hidden by default) -->
        <div id="progressContainer" class="progress-container" style="display: none; margin-top: 15px;">
          <div class="progress-label" id="progressLabel">Processing...</div>
          <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar-fill"></div>
          </div>
        </div>
      </div>

      <!-- Transcript Section -->
      <div class="transcript-section">
        <label for="transcript" class="transcript-label">📝 Transcript</label>
        
        <!-- Tab Controls for Transcript View -->
        <div class="transcript-tabs">
          <button id="tabText" class="tab-btn active">Raw Text</button>
          <button id="tabTimed" class="tab-btn">Interactive (Timed)</button>
        </div>

        <textarea id="transcript" class="transcript-area" placeholder="Your transcribed text will appear here..."></textarea>
        
        <div id="timedTranscript" class="transcript-area timed-transcript" style="display: none; overflow-y: auto;">
          <div class="timed-empty">No interactive transcript available.</div>
        </div>

        <div class="transcript-actions">
          <button id="copyTranscriptBtn" class="main-action">📋 Copy</button>
          <button id="sendToLLMBtn" class="main-action">🤖 Summarize (Offline)</button>
        </div>
      </div>

      <!-- Summary Section -->
      <div class="summary-section">
        <label class="transcript-label">📊 Summary</label>
        <div id="summary" class="summary-content"></div>
        <button id="copySummaryBtn" class="secondary-action">📋 Copy Summary</button>
      </div>

      <!-- History Section -->
      <div class="history-section">
        <label class="transcript-label">📚 History</label>
        <ul id="historyList" class="history-list"></ul>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusBar" class="status-bar">Initializing...</div>

  <!-- Update Banner -->
  <div id="updateBanner" style="display:none;position:fixed;bottom:60px;left:0;width:100%;background:#667eea;color:#fff;text-align:center;padding:12px 0;z-index:1000;cursor:pointer;font-weight:600;box-shadow:0 -2px 8px 0 rgba(102,126,234,0.3);">
    A new version is available. Click to update.
  </div>

  <!-- Load Vosk library and implementation -->
  <script src="vosk.js"></script>
  <script src="vosk-latest.js?v=7"></script>
  
  <!-- Load the modular app -->
  <script type="module" src="app.js?v=7"></script>
</body>
</html>
