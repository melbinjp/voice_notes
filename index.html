<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/melbinjp/favicon/master/favicon.svg">
  <title>Voice Notes PWA</title>
</head>
<body>
  <div id="app">
    <h1>Voice Notes</h1>
    <div class="recorder-controls">
      <button id="recordBtn">Start Recording</button>
      <label class="upload-btn-wrapper">
        Upload Audio
        <input type="file" id="uploadInput" accept="audio/*" style="display: none;">
      </label>
      <span id="recordingStatus"></span>
    </div>
    <div class="session-title-section">
      <input id="sessionTitle" type="text" placeholder="Session Title (optional)" maxlength="100" />
    </div>
    <div class="transcript-section">
      <h2>Transcript</h2>
      <textarea id="transcript"></textarea>
      <div class="actions">
        <button id="pasteTestBtn" title="Paste clipboard text into transcript">Paste Text</button>
        <button id="copyTranscriptBtn" title="Copy Transcript">Copy</button>
        <select id="summaryStyleSelect" class="model-select">
          <option value="standard">Standard Summary</option>
          <option value="bullets">Bullet Points</option>
          <option value="action-items">Action Items</option>
        </select>
        <button id="sendToLLMBtn">Summarize</button>
      </div>
      <div class="summarize-controls" id="summarizeControls"></div>
    </div>
    <div class="status-bar" id="statusBar"></div>
    <div class="summary-section">
      <h2>Summary</h2>
      <div id="summary"></div>
      <div class="actions">
        <button id="copySummaryBtn" title="Copy Summary">Copy Text</button>
        <button id="copyMarkdownBtn" title="Copy as Markdown">Copy Markdown</button>
      </div>
    </div>

    <div class="status-card">
      <div class="status-card-header" id="statusCardHeader" aria-expanded="false" aria-controls="statusCardContent" tabindex="0">
        <span>Offline Models Status</span>
        <span class="status-arrow">▶</span>
      </div>
      <div class="status-card-content" id="statusCardContent" style="display: none;">
        <div class="model-status-item">
          <div>
            <strong>Transcription (Whisper)</strong>
            <select id="transcriptionModelSelect" class="model-select">
              <option value="Xenova/whisper-tiny.en">Tiny (English-only, ~75MB)</option>
              <option value="Xenova/whisper-base.en">Base (English-only, ~142MB)</option>
              <option value="Xenova/whisper-small.en">Small (English-only, ~466MB)</option>
              <option value="Xenova/whisper-tiny">Tiny (Multilingual, ~77MB)</option>
              <option value="Xenova/whisper-base">Base (Multilingual, ~148MB)</option>
            </select>
            <select id="languageSelect" class="model-select">
              <option value="auto">Auto-Detect</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
              <option value="zh">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
            </select>
          </div>
          <div class="status-and-progress">
            <span id="transcriptionModelStatus">Not Loaded</span>
            <span id="transcriptionProgress" class="download-progress"></span>
          </div>
          <div class="actions">
            <button id="downloadTranscriptionModelBtn">Download</button>
            <button id="clearTranscriptionModelBtn">Clear</button>
          </div>
        </div>
        <div class="model-status-item">
          <div>
            <strong>Summarization (DistilBART)</strong>
            <select id="summarizationModelSelect" class="model-select">
              <option value="Xenova/distilbart-cnn-6-6">DistilBART (Default, ~250MB)</option>
              <option value="Xenova/t5-small">T5-Small (Alternative, ~240MB)</option>
              <option value="Xenova/bart-large-cnn">BART-Large (High Quality, >1GB)</option>
            </select>
          </div>
          <div class="status-and-progress">
            <span id="summarizationModelStatus">Not Loaded</span>
            <span id="summarizationProgress" class="download-progress"></span>
          </div>
          <div class="actions">
            <button id="downloadSummarizationModelBtn">Download</button>
            <button id="clearSummarizationModelBtn">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <div class="history-section-bottom">
      <h2>History</h2>
      <ul id="historyList"></ul>
    </div>
  </div>
  <div id="updateBanner" style="display:none;position:fixed;bottom:0;left:0;width:100%;background:#1976d2;color:#fff;text-align:center;padding:12px 0;z-index:1000;cursor:pointer;font-weight:600;box-shadow:0 -2px 8px 0 rgba(25,118,210,0.10);">
    A new version is available. Click to update.
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
