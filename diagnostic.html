<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modular System Diagnostic</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🔍 Modular System Diagnostic</h1>
  
  <div id="status" class="status info">Loading modules...</div>
  <pre id="output"></pre>

  <!-- Load Vosk library -->
  <script src="vosk.js"></script>
  <script src="vosk-latest.js?v=7"></script>
  
  <!-- Load modules -->
  <script type="module">
    import moduleRegistry from './module-loader.js?v=7';
    import ModularRecognitionManager from './modular-recognition-manager.js?v=7';
    
    // Make available globally
    window.moduleRegistry = moduleRegistry;
    window.ModularRecognitionManager = ModularRecognitionManager;
    
    // Run diagnostic
    setTimeout(runDiagnostic, 500);
  </script>

  <script>
    function updateStatus(message, type = 'info') {
      document.getElementById('status').textContent = message;
      document.getElementById('status').className = `status ${type}`;
    }

    function log(message) {
      const output = document.getElementById('output');
      output.textContent += message + '\n';
    }

    async function runDiagnostic() {
      try {
        log('=== Modular System Diagnostic ===');
        log(`Timestamp: ${new Date().toISOString()}`);
        log(`User Agent: ${navigator.userAgent}`);
        log(`Location: ${window.location.href}`);
        log('');

        // Check module registry
        log('1. Checking Module Registry...');
        if (!window.moduleRegistry) {
          throw new Error('Module registry not available');
        }
        
        const modules = window.moduleRegistry.getAvailableModules();
        log(`   Found ${modules.length} registered modules`);
        
        if (modules.length === 0) {
          updateStatus('❌ No modules registered', 'error');
          log('   ERROR: No modules found in registry');
          return;
        }

        modules.forEach(module => {
          log(`   - ${module.icon} ${module.name} (${module.id})`);
          log(`     Type: ${module.isOffline ? 'Offline' : 'Online'}`);
          log(`     Features: ${module.features.join(', ')}`);
        });

        // Check recognition manager
        log('');
        log('2. Checking Recognition Manager...');
        if (!window.ModularRecognitionManager) {
          throw new Error('Recognition manager not available');
        }

        const manager = new window.ModularRecognitionManager();
        const availableEngines = await manager.getAvailableEngines();
        log(`   Found ${availableEngines.length} available engines`);

        if (availableEngines.length === 0) {
          updateStatus('⚠️ No engines available', 'error');
          log('   WARNING: No engines available for use');
        } else {
          availableEngines.forEach(engine => {
            log(`   - ${engine.icon} ${engine.name} (${engine.id})`);
          });
        }

        // Test engine selection
        log('');
        log('3. Testing Engine Selection...');
        if (availableEngines.length > 0) {
          try {
            const bestEngine = await manager.autoSelectEngine(['offline_processing', 'file_transcription']);
            if (bestEngine) {
              log(`   Auto-selected: ${bestEngine.name}`);
              updateStatus(`✅ System ready - Using ${bestEngine.name}`, 'success');
            } else {
              log('   No suitable engine found for auto-selection');
              updateStatus('⚠️ System ready but no optimal engine selected', 'info');
            }
          } catch (error) {
            log(`   Auto-selection failed: ${error.message}`);
            updateStatus('⚠️ System ready but auto-selection failed', 'info');
          }
        }

        // Show debug info
        log('');
        log('4. Debug Information:');
        const debugInfo = {
          registry: window.moduleRegistry.getDebugInfo(),
          manager: manager.getDebugInfo(),
          timestamp: new Date().toISOString()
        };
        log(JSON.stringify(debugInfo, null, 2));

      } catch (error) {
        log(`ERROR: ${error.message}`);
        log(error.stack);
        updateStatus(`❌ Diagnostic failed: ${error.message}`, 'error');
      }
    }
  </script>
</body>
</html>
